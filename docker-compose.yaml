version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chat-db
    restart: always
    environment:
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpassword
      POSTGRES_DB: chatdb
    ports:
      - "5433:5432" # Ajustei para expor na 5433 caso sua 5432 já esteja em uso
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: chat-rabbitmq
    ports:
      - "5672:5672"   # Porta padrão AMQP
      - "15672:15672" # Painel de Controle (Admin - http://localhost:15672)
      - "61613:61613" # Porta vital para o STOMP (WebSocket)
    # Ativa o STOMP automaticamente ao iniciar
    command: sh -c "rabbitmq-plugins enable --offline rabbitmq_stomp; rabbitmq-server"

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: chat-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: chat-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Configuração dupla: permite que o backend no docker acesse via 'kafka:29092' e sua IDE local via 'localhost:9092'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chat-backend
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      - db
      - rabbitmq
      - kafka
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/chatdb
      - SPRING_DATASOURCE_USERNAME=chatuser
      - SPRING_DATASOURCE_PASSWORD=chatpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_FLYWAY_ENABLED=false
      # Informa ao Spring Boot onde achar os novos serviços dentro da rede do Docker
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - APP_RABBITMQ_HOST=rabbitmq

volumes:
  pgdata: